<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>X Clipper 設定</title>
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 24px;
        color: #1f2933;
        background: #f8fafc;
      }

      main {
        max-width: 560px;
        padding: 24px;
        background: #ffffff;
        border-radius: 12px;
        box-shadow: 0 10px 20px rgba(15, 23, 42, 0.08);
      }

      h1 {
        font-size: 1.4rem;
        margin-bottom: 16px;
      }

      h2 {
        font-size: 1rem;
        margin: 0 0 8px;
      }

      label {
        display: block;
        font-weight: 600;
        margin-bottom: 6px;
      }

      input,
      select,
      button {
        width: 100%;
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid #cbd5e1;
        font-size: 0.95rem;
        background-color: #f9fafb;
      }

      input:focus,
      select:focus {
        outline: none;
        border-color: #2563eb;
        background-color: #ffffff;
        box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.15);
      }

      fieldset {
        border: none;
        padding: 0;
        margin: 0 0 24px 0;
      }

      .field {
        margin-bottom: 18px;
      }

      .field-row {
        display: flex;
        gap: 8px;
        align-items: end;
      }

      .field-row .field-grow {
        flex: 1;
      }

      .helper {
        font-size: 0.8rem;
        color: #64748b;
        margin-top: 4px;
      }

      .schema-box {
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        background: #f8fafc;
        padding: 10px 12px;
        max-height: 180px;
        overflow: auto;
      }

      .schema-box ul {
        margin: 0;
        padding-left: 18px;
      }

      .schema-box li {
        font-size: 0.85rem;
        margin-bottom: 4px;
      }

      button.fetch-btn {
        width: auto;
        min-width: 140px;
        background: #ffffff;
        color: #1e40af;
        border-color: #93c5fd;
        cursor: pointer;
      }

      button[type="submit"] {
        background-color: #2563eb;
        color: white;
        border: none;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s ease;
      }

      button[type="submit"]:hover {
        background-color: #1d4ed8;
      }

      button[disabled] {
        opacity: 0.6;
        cursor: not-allowed;
      }

      #status {
        min-height: 1.2em;
        font-size: 0.85rem;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Notion 連携設定</h1>
      <form id="options-form">
        <fieldset>
          <div class="field">
            <label for="notionApiKey">Notion API キー</label>
            <input
              id="notionApiKey"
              name="notionApiKey"
              type="password"
              autocomplete="off"
              placeholder="ntn_xxx"
              required
            />
            <p class="helper">
              Notion の統合で発行したシークレット（<code>ntn_</code>）を入力してください。
            </p>
          </div>
          <div class="field">
            <div class="field-row">
              <div class="field-grow">
                <label for="notionDatabaseId">Notion データベース</label>
                <select id="notionDatabaseId" name="notionDatabaseId" required>
                  <option value="">先に「DB一覧を取得」を実行してください</option>
                </select>
              </div>
              <button id="loadDatabasesButton" class="fetch-btn" type="button">DB一覧を取得</button>
            </div>
            <p class="helper">
              Integration に共有されているデータベースのみ表示されます。
            </p>
          </div>
        </fieldset>

        <fieldset>
          <legend>プロパティマッピング</legend>
          <div class="field">
            <label for="mapTitle">タイトル（ツイート本文の要約）</label>
            <select id="mapTitle" name="mapTitle" required></select>
          </div>
          <div class="field">
            <label for="mapScreenName">表示名（Screen Name）</label>
            <select id="mapScreenName" name="mapScreenName" required></select>
          </div>
          <div class="field">
            <label for="mapUserName">ユーザー名（@付き）</label>
            <select id="mapUserName" name="mapUserName" required></select>
          </div>
          <div class="field">
            <label for="mapTweetUrl">URL</label>
            <select id="mapTweetUrl" name="mapTweetUrl" required></select>
          </div>
          <div class="field">
            <label for="mapPostedAt">投稿日時</label>
            <select id="mapPostedAt" name="mapPostedAt" required></select>
          </div>
        </fieldset>

        <button type="submit">保存する</button>
        <p id="status"></p>
      </form>
    </main>

    <script type="module" src="options.js"></script>
  </body>
</html>
