name: Tag On Release PR Merge

on:
  pull_request:
    types:
      - closed
    branches:
      - main

jobs:
  tag:
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'release/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.merge_commit_sha }}
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: Determine version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
      - name: Create and push tag
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists. Skip."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${TAG}"
          git push origin "${TAG}"
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build production package
        run: pnpm run build:prod
      - name: Create zip archive
        id: archive
        run: |
          ZIP_NAME="x-clipper-v${{ steps.version.outputs.version }}.zip"
          (cd dist && zip -r "../${ZIP_NAME}" .)
          echo "zip_name=${ZIP_NAME}" >> "$GITHUB_OUTPUT"
      - name: Upload dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ format('x-clipper-dist-{0}', github.sha) }}
          path: dist/
          retention-days: 30
      - name: Upload zip artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.archive.outputs.zip_name }}
          path: ${{ steps.archive.outputs.zip_name }}
          retention-days: 30
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          files: ${{ steps.archive.outputs.zip_name }}
